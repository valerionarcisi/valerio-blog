[build.environment]
  NPM_FLAGS = "--version"
  NETLIFY_USE_PNPM = "true"
  SECRETS_SCAN_ENABLED = "false"
[build]
  command = "env | grep -E '^(ADMIN_TOKEN|TURSO_|STRAVA_|TMDB_|LASTFM_|RESEND_)' > .env && pnpm build && rm -f .env"
  publish = "dist"
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Language redirect handled client-side (see BaseHead.astro)
# to avoid blocking Googlebot from indexing Italian pages

# IT→EN path mismatches: client-side redirect prepends /en/, but
# these IT slugs differ from their EN counterparts.
[[redirects]]
  from = "/en/visti"
  to = "/en/watched/"
  status = 301
[[redirects]]
  from = "/en/visti/"
  to = "/en/watched/"
  status = 301
